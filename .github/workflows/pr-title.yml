name: pr-title

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened

jobs:
  lint-pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      # Types mirror cliff.toml's commit_parsers so the changelog and this
      # gate agree on the same vocabulary. No checkout here — this only
      # reads github.event.pull_request.title via the API, so
      # pull_request_target (needed for this to work on fork PRs) carries no
      # untrusted-checkout risk.
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            perf
            refactor
            style
            test
            chore
            ci
          requireScope: false
